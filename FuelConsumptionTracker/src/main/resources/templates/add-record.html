<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add Fuel Record</title>
    <link rel="stylesheet" th:href="@{/style.css}">
</head>
<body>
    <div class="container">
        <h1>Add Fuel Record</h1>
        
        <div class="error" th:if="${error}" th:text="${error}">Error message here</div>

        <form th:action="@{/add-record}" method="post">
            <div>
                <label>Select Vehicle:</label>
                <select name="vehicleId">
                    <option th:each="v : ${vehicles}" 
                            th:value="${v.vehicleId}" 
                            th:text="${v.vehicleName + ' (' + v.vehicleId + ')'}">Vehicle</option>
                </select>
            </div>
            <div>
                <label>Fuel Added (Liters):</label>
                <input type="number" step="0.01" name="fuel" required>
            </div>
            <div>
                <label>Distance Traveled (km):</label>
                <input type="number" step="0.1" name="distance" required>
            </div>
            <div>
                <label>Date (dd-MM-yyyy):</label>
                <input type="text" name="date" required placeholder="10-05-2026">
            </div>
            <button type="submit" class="btn">Add Record</button>
            <a th:href="@{/}" class="btn btn-secondary">Back to Dashboard</a>
        </form>
    </div>
</body>
</html>
